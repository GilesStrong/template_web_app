name: CI

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".github/workflows/backend_ci.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "app/**"

jobs:
  backend-linting:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache uv resolver + project venv
      - name: Cache uv + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ./.venv
          key: uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv --version

      # Install deps (dev group included by default); --frozen enforces uv.lock
      - name: Sync dependencies
        run: uv sync --frozen

      # Ruff: formatting check (no changes) and lint (GitHub format for inline annotations)
      - name: Ruff format (check)
        run: uv run ruff format --check app

      - name: Ruff lint
        run: uv run ruff check --output-format=github app

      # MyPy (uses your [tool.mypy] config in pyproject)
      - name: MyPy
        run: uv run mypy .

  backend-tests:
    runs-on: ubuntu-24.04
    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: tests_myapp
          POSTGRES_USER: tests_myapp_user
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tests_myapp_user -d tests_myapp"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache uv + venv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            ./.venv
          key: uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ runner.arch }}-py${{ steps.setup-python.outputs.python-version || '3.12' }}-

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv
          uv --version

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run tests
        env:
          APP_ENV_FILE: ${{ github.workspace }}/.env.tests
          POSTGRES_HOST: 127.0.0.1
          POSTGRES_PORT: 5432
        run: cd app && uv run python manage.py test --failfast
