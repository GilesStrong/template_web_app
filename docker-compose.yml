version: '3.8'

x-app-common: &app-common
  image: myapp-app:dev
  build:
    context: .
  env_file:
    - .env
  volumes:
    - .:/app
  depends_on:
    - db
    - redis
  networks:
    - myapp_network
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  db:
    image: postgres:16
    container_name: postgres_db
    restart: always
    env_file:
      - .env
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - myapp_postgres_data:/var/lib/postgresql/data
    networks:
      - myapp_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7
    container_name: redis
    restart: always
    networks:
      - myapp_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  web:
    <<: *app-common
    container_name: django_app
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "127.0.0.1:8001:8000"
    depends_on:
      - db
      - redis

  celery_worker:
    <<: *app-common
    container_name: celery_worker
    command: celery -A app worker -Q default --loglevel=info --concurrency=8 -n worker_default@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_llm_worker:
    <<: *app-common
    container_name: celery_llm_worker
    command: celery -A app worker -Q llm --loglevel=info --concurrency=1 --pool=prefork --max-tasks-per-child=50 -n worker_llm@%h
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy


  celery_beat:
    <<: *app-common
    container_name: celery_beat
    command: celery -A app beat --loglevel=info
    restart: always

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - myapp_qdrant_data:/qdrant/storage
    restart: always
    networks:
      - myapp_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


volumes:
  myapp_postgres_data:
  myapp_qdrant_data:

networks:
  myapp_network:
