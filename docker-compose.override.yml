version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
    - ./frontend/.env
    volumes:
      - ./frontend:/app
      # keep dependencies in a named volume so bind-mount doesn't overwrite them
      - myapp_bun_cache:/root/.bun
      - myapp_frontend_node_modules:/app/node_modules
      - myapp_frontend_next_cache:/app/.next
      - myapp_playwright_browsers:/ms-playwright
    networks:
      - myapp_network
    restart: unless-stopped

  proxy:
    image: caddy:2-alpine
    ports:
      - "${PORT}:3000"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    env_file:
    - ./frontend/.env
    environment:
      - BACKEND_UPSTREAM=web:8000
      - FRONTEND_UPSTREAM=frontend:3001
      - PUBLIC_URL=${PUBLIC_URL}
      - ADMIN_ALLOWLIST_CIDRS=${ADMIN_ALLOWLIST_CIDRS:-127.0.0.1/32}
    networks:
      - myapp_network
    depends_on:
      - frontend
      - web
    restart: unless-stopped

volumes:
  myapp_bun_cache:
  myapp_frontend_node_modules:
  myapp_frontend_next_cache:
  myapp_playwright_browsers:
